services:
  db:
    image: docker.io/postgres:18-alpine
    container_name: community_db
    restart: always
    network_mode: "host"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: community_management_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_vol:/var/lib/postgresql/data
      - ./init_sql:/docker-entrypoint-initdb.d:ro,Z
      
volumes:
  postgres_data_vol:
