spring:
  datasource:
    url: jdbc:postgresql://db:${DB_EXTERNAL_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  docker:
    compose:
      enabled: true
      file: compose.yaml
      lifecycle-management: start_and_stop
      skip:
        in-tests: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 1d

worker:
  retry:
    base-delay: 5s
    max-delay: 300s
    max-retries: 10